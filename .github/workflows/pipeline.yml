name: DevSecOps Pipeline

on: [push]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Tools
      run: |
        pip install bandit safety

    - name: Run SAST (Bandit)
      run: bandit -r .

    - name: Dependency Scan (Safety)
      run: safety check

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'

    - name: Container Scan
      run: trivy fs .

      