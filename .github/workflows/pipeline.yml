name: DevSecOps Pipeline

on: [push]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Tools
      run: |
        pip install bandit safety

    - name: Run SAST (Bandit)
      run: bandit -r .

    - name: Dependency Scan (Safety)
      run: safety check

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'

    - name: Container Scan
      run: trivy fs .

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: docker build -t myapp .

    - name: Scan Docker Image
      run: trivy image myapp

    - name: Run DAST (Basic Curl Test)
      run: curl http://localhost:5000 || true